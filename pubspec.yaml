name: re_tsm
description: A new Flutter project for TeamSpeak 6.0 Management (ReTSM)

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  dynamic_color: ^1.6.8
  fluentui_system_icons: ^1.1.205
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2

  flutter_rust_bridge: 2.12.0
  rust_lib_re_tsm:
    path: rust_builder

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  fonts:
    - family: Google Sans Flex
      fonts:
        - asset: assets/fonts/Google_Sans_Flex/GoogleSansFlex-VariableFont_GRAD,ROND,opsz,slnt,wdth,wght.ttf
    - family: Google Sans Code
      fonts:
        - asset: assets/fonts/Google_Sans_Code/GoogleSansCode-VariableFont_wght.ttf
        - asset: assets/fonts/Google_Sans_Code/GoogleSansCode-Italic-VariableFont_wght.ttf
          style: italic
    - family: Noto Sans SC
      fonts:
        - asset: assets/fonts/Noto_Sans_SC/NotoSansSC-VariableFont_wght.ttf
